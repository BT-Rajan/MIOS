version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: mios-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-mios_root_2024}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mios}
      MYSQL_USER: ${MYSQL_USER:-mios_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mios_pass_2024}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    networks:
      - mios-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: mios-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - mios-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mios-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+mysqlconnector://${MYSQL_USER:-mios_user}:${MYSQL_PASSWORD:-mios_pass_2024}@db:3306/${MYSQL_DATABASE:-mios}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mios-network
    volumes:
      - ./backend:/app
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mios-celery
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+mysqlconnector://${MYSQL_USER:-mios_user}:${MYSQL_PASSWORD:-mios_pass_2024}@db:3306/${MYSQL_DATABASE:-mios}
      REDIS_URL: redis://redis:6379/0
    command: celery -A core.celery_app worker --loglevel=info
    depends_on:
      - backend
      - redis
    networks:
      - mios-network
    volumes:
      - ./backend:/app

  # Celery Beat (Scheduled Tasks)
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mios-celery-beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+mysqlconnector://${MYSQL_USER:-mios_user}:${MYSQL_PASSWORD:-mios_pass_2024}@db:3306/${MYSQL_DATABASE:-mios}
      REDIS_URL: redis://redis:6379/0
    command: celery -A core.celery_app beat --loglevel=info
    depends_on:
      - backend
      - redis
    networks:
      - mios-network
    volumes:
      - ./backend:/app

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: mios-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - mios-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # React Frontend (Build stage - serves static files via nginx in production)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mios-frontend-build
    profiles:
      - build
    networks:
      - mios-network
    volumes:
      - ./frontend/dist:/app/dist

networks:
  mios-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
